apiVersion: apps/v1
kind: Deployment
metadata:
  name: dotnet-fsharp
  namespace: dotnet-fsharp
  labels:
    app: dotnet-fsharp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dotnet-fsharp
  template:
    metadata:
      labels:
        app: dotnet-fsharp
    spec:
      containers:
      - name: dotnet-fsharp
        image: dotnet-fsharp
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "768Mi"
            cpu: "500m"
      restartPolicy: Always
